name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend — pytest + content validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Run tests (includes challenge JSON schema + answer validation)
        run: pytest

  frontend:
    name: frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Typecheck + build (enforces bundle build)
        run: npm run build
